
version: 2

sources:
  - name: tpch
    description: Sample TPCH dataset from Snowflake
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1

    freshness:
      warn_after: {count: 4, period: hour}
      error_after: {count: 12, period: hour}

    tables:

      - name: orders
        description: Orders placed by customers
        loaded_at_field: O_ORDERDATE

        columns:
          - name: O_ORDERKEY
            tests: [not_null, unique]

          - name: O_CUSTKEY
            tests: [not_null]

      - name: lineitem
        description: Line items for each order
        loaded_at_field: L_SHIPDATE

        columns:
          - name: L_ORDERKEY
            tests: [not_null]

      - name: customer
        description: Customer master data

        columns:
          - name: C_CUSTKEY
            tests: [not_null, unique]

      - name: nation
        description: Nation lookup table

        columns:
          - name: N_NATIONKEY
            tests: [not_null, unique]